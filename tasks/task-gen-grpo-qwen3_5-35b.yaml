# Task Generation GRPO Training via SkyPilot - Qwen3.5-35B-A3B (MoE, Multi-Node)
# Usage: sky launch tasks/task-gen-grpo-qwen3_5-35b.yaml --env FLEET_API_KEY=<key> --env WANDB_API_KEY=<key>
#
# MoE: 35B total, 3B active (256 experts, 9 active/token). GatedDeltaNet architecture.
# Multi-node (2-node default, 16 GPUs total): TP=2, 8 inference engines.
# flash_attn=false (SDPA) to avoid Xid 31 in GatedDeltaNet with vLLM 0.18.0.

name: task-gen-grpo-qwen3-5-35b

resources:
  disk_size: 750
  memory: 1500+
  ports: 6479
  any_of:
    - accelerators: H200:8
      cloud: gcp
      use_spot: true
      image_id: projects/deeplearning-platform-release/global/images/common-cu128-ubuntu-2204-nvidia-570-v20260305
    - accelerators: H200:8
      cloud: runpod
    - accelerators: H200:8
      cloud: lambda

num_nodes: 2

workdir:
  url: https://github.com/fleet-ai/SkyRL-v2.git
  ref: main

envs:
  WANDB_API_KEY: ""
  FLEET_API_KEY: ""
  LOGGER: "wandb"
  INFERENCE_BACKEND: "vllm"
  DATA_VERSION: "v55"
  MODALITY: "tool_use"
  MAX_TURNS: 10
  MAX_INPUT_LENGTH: 72000
  MAX_GENERATE_LENGTH: 4096
  NUM_EPOCHS: 20
  JUDGE_MODEL: "anthropic/claude-sonnet-4.5"
  OPENROUTER_API_KEY: ""
  EVALUATOR_MODEL: "anthropic/claude-sonnet-4.5"
  K_ROLLOUTS: 4
  ALPHA: "1.0"
  MAX_EVAL_STEPS: 20
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_REGION: "us-east-1"
  S3_DATASET_BUCKET: "fleet-internal-datasets"
  S3_CHECKPOINT_BUCKET: "skyrl-checkpoints"
  S3_TRAJECTORY_BUCKET: "skyrl-trajectories"
  NUM_INFERENCE_ENGINES: 8

setup: |
  bash scripts/fleet-common-setup.sh \
    --openenv-branch deniz/fleet_client \
    --extra-setup scripts/fleet-qwen35-extra-setup.sh \
    --env-class task_gen

run: |
  bash scripts/fleet-task-gen-35b-run.sh
