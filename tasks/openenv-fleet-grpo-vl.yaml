# Fleet VL/CUA GRPO Training via SkyPilot - Qwen3.5-9B (Vision-Language)
# Usage: sky launch tasks/openenv-fleet-grpo-vl.yaml --env FLEET_API_KEY=<key> --env WANDB_API_KEY=<key>
#
# VL (Vision-Language) training for browser_use environments with screenshots.
# Based on working config from SkyRL PR #288 (feat/vl-support-clean).
#
# Model: Qwen/Qwen3.5-9B (9B params, natively multimodal, GatedDeltaNet)
# GPUs: 8x H200 (single node, TP=1)
#
# NOTE: Requires vLLM >= 0.17.0 for native Qwen3.5/GDN support + FlashAttention 4

name: fleet-vl-grpo-qwen3-5-9b

resources:
  disk_size: 750
  ports: 6479
  any_of:
    - accelerators: H200:8
      cloud: gcp
      use_spot: true
      image_id: projects/deeplearning-platform-release/global/images/common-cu128-ubuntu-2204-nvidia-570-v20260305
    - accelerators: H200:8
      cloud: runpod
    - accelerators: H200:8
      cloud: lambda
    - accelerators: H200:8
      cloud: nebius
    - accelerators: H200-SXM:8
      cloud: vast

num_nodes: 1

workdir:
  url: https://github.com/fleet-ai/SkyRL-v2.git
  ref: main

envs:
  WANDB_API_KEY: ""
  FLEET_API_KEY: ""
  LOGGER: "wandb"
  INFERENCE_BACKEND: "vllm"
  DATA_VERSION: "v6"
  ENV_KEYS: ""
  DIFFICULTY: ""
  MODALITY: "browser_use"
  MAX_TURNS: 64
  MAX_INPUT_LENGTH: 96000
  MAX_GENERATE_LENGTH: 4096
  NUM_EPOCHS: 10
  RUN_ID: ""
  MAX_TASKS: ""
  RESUME_RUN_NAME: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_REGION: "us-east-1"
  S3_DATASET_BUCKET: "fleet-internal-datasets"
  S3_CHECKPOINT_BUCKET: "skyrl-checkpoints"
  S3_TRAJECTORY_BUCKET: "skyrl-trajectories"

setup: |
  bash scripts/fleet-common-setup.sh \
    --openenv-branch deniz/fleet_client \
    --extra-setup scripts/fleet-qwen35-extra-setup.sh

run: |
  bash scripts/fleet-vl-run.sh
