# Gym-Anything GRPO Training — Qwen3.5-9B (Desktop CUA)
# Trains on 200+ desktop software environments from gym-anything/CUA-World.
#
# Usage:
#   # 1. Start gym-anything remote server (CPU VM with Docker + sysbox):
#   #    python -m gym_anything.remote.master --host 0.0.0.0 --port 5000
#   #
#   # 2. Launch training (GPU VM):
#   sky launch tasks/gym-anything-grpo-vl.yaml \
#     --env WANDB_API_KEY=<key> \
#     --env GYM_ANYTHING_REMOTE_URL=http://<server-ip>:5000
#
# The training VM talks to gym-anything over HTTP — no Docker/sysbox needed here.

name: fleet-gym-anything-grpo-qwen3-5-9b

resources:
  disk_size: 750
  ports: 6479
  any_of:
    - accelerators: H200:8
      cloud: gcp
      use_spot: true
      image_id: projects/deeplearning-platform-release/global/images/common-cu128-ubuntu-2204-nvidia-570-v20260305
    - accelerators: H200-SXM:8
      cloud: runpod
    - accelerators: H200:8
      cloud: lambda
    - accelerators: H200:8
      cloud: nebius

num_nodes: 1

workdir:
  url: https://github.com/fleet-ai/SkyRL-v2.git
  ref: feat/gym-anything-integration

envs:
  WANDB_API_KEY: ""
  FLEET_API_KEY: ""
  LOGGER: "wandb"
  INFERENCE_BACKEND: "vllm"
  MODALITY: "gym_anything"
  MAX_TURNS: 50
  MAX_INPUT_LENGTH: 96000
  MAX_GENERATE_LENGTH: 4096
  NUM_EPOCHS: 10
  RUN_ID: ""
  RESUME_RUN_NAME: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_REGION: "us-east-1"
  S3_DATASET_BUCKET: "fleet-internal-datasets"
  S3_CHECKPOINT_BUCKET: "skyrl-checkpoints"
  S3_TRAJECTORY_BUCKET: "skyrl-trajectories"
  # gym-anything remote server URL (runs Docker+sysbox containers)
  GYM_ANYTHING_REMOTE_URL: ""

setup: |
  # Standard SkyRL setup (venv, deps, model-specific extras)
  bash scripts/fleet-common-setup.sh \
    --openenv-branch deniz/fleet_client \
    --extra-setup scripts/fleet-qwen35-extra-setup.sh \
    --skip-prepare

  source .venv/bin/activate

  # gym-anything client (RemoteGymEnv only, no Docker needed)
  if [ ! -d ~/gym-anything ]; then
    git clone --depth 1 https://github.com/cmu-l3/gym-anything.git ~/gym-anything
  fi
  pip install -e ~/gym-anything || true

  # Download pre-built dataset from S3
  mkdir -p ~/data/fleet/gym_anything
  aws s3 cp s3://fleet-internal-datasets/gym-anything/tasks.json ~/data/fleet/tasks_gym_anything.json --region us-east-1
  aws s3 cp s3://fleet-internal-datasets/gym-anything/train.parquet ~/data/fleet/gym_anything/train.parquet --region us-east-1
  aws s3 cp s3://fleet-internal-datasets/gym-anything/validation.parquet ~/data/fleet/gym_anything/validation.parquet --region us-east-1
  echo "Train: $(python3 -c 'import pyarrow.parquet as pq; print(len(pq.read_table("'$HOME'/data/fleet/gym_anything/train.parquet")))') tasks"
  echo "Eval: $(python3 -c 'import pyarrow.parquet as pq; print(len(pq.read_table("'$HOME'/data/fleet/gym_anything/validation.parquet")))') tasks"

run: |
  bash scripts/fleet-gym-anything-run.sh
