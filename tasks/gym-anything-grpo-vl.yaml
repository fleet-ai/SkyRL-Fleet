# Gym-Anything GRPO Training — Qwen3.5-9B (Desktop CUA)
# Trains on 200+ desktop software environments from gym-anything/CUA-World.
#
# Usage: sky launch tasks/gym-anything-grpo-vl.yaml --env WANDB_API_KEY=<key>
#
# Model: Qwen/Qwen3.5-9B (9B params, natively multimodal, GatedDeltaNet)
# GPUs: 8x H200 (single node, TP=1)
# Environments: Docker containers running real desktop software (Blender, GIMP, LibreOffice, etc.)
#
# NOTE: Requires Docker on the training node. RunPod preferred (Docker pre-installed).
# First run per environment takes 5-30min for Docker build; subsequent runs use cache.

name: fleet-gym-anything-grpo-qwen3-5-9b

resources:
  disk_size: 1000
  ports: 6479
  any_of:
    - accelerators: H200-SXM:8
      cloud: runpod
    - accelerators: H200:8
      cloud: gcp
      use_spot: true
      image_id: projects/deeplearning-platform-release/global/images/common-cu128-ubuntu-2204-nvidia-570-v20260305
    - accelerators: H200:8
      cloud: lambda
    - accelerators: H200:8
      cloud: nebius

num_nodes: 1

workdir:
  url: https://github.com/fleet-ai/SkyRL-v2.git
  ref: feat/gym-anything-integration

envs:
  WANDB_API_KEY: ""
  FLEET_API_KEY: ""
  LOGGER: "wandb"
  INFERENCE_BACKEND: "vllm"
  MODALITY: "gym_anything"
  MAX_TURNS: 50
  MAX_INPUT_LENGTH: 96000
  MAX_GENERATE_LENGTH: 4096
  NUM_EPOCHS: 10
  RUN_ID: ""
  RESUME_RUN_NAME: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_REGION: "us-east-1"
  S3_DATASET_BUCKET: "fleet-internal-datasets"
  S3_CHECKPOINT_BUCKET: "skyrl-checkpoints"
  S3_TRAJECTORY_BUCKET: "skyrl-trajectories"
  # gym-anything needs Docker; sysbox-runc is optional (for systemd inside containers)
  GYM_ANYTHING_RUNNER: "docker"

setup: |
  # Install Docker if not available (GCP DL images don't include it)
  if ! command -v docker &>/dev/null; then
    echo "Installing Docker..."
    curl -fsSL https://get.docker.com | sudo sh
    sudo usermod -aG docker $USER
    sudo systemctl enable --now docker
  fi
  # Ensure current user can run Docker without sudo
  if ! docker info &>/dev/null; then
    sudo chmod 666 /var/run/docker.sock 2>/dev/null || true
  fi
  # Install sysbox-runc (required by gym-anything envs with systemd containers)
  if ! command -v sysbox-runc &>/dev/null; then
    echo "Installing sysbox-runc..."
    SYSBOX_VER="0.6.7"
    wget -q "https://github.com/nestybox/sysbox/releases/download/v${SYSBOX_VER}/sysbox-ce_${SYSBOX_VER}-0.linux_amd64.deb" -O /tmp/sysbox.deb
    sudo apt-get install -y jq rsync || true
    sudo dpkg -i /tmp/sysbox.deb || sudo apt-get install -f -y
    rm -f /tmp/sysbox.deb
    # Verify sysbox is registered with Docker
    sudo systemctl restart docker || true
    sleep 3
    docker info 2>&1 | grep -i sysbox && echo "sysbox-runc registered" || echo "WARN: sysbox-runc not in Docker runtimes"
  fi
  bash scripts/fleet-common-setup.sh \
    --openenv-branch deniz/fleet_client \
    --extra-setup scripts/fleet-qwen35-extra-setup.sh \
    --env-class gym_anything

run: |
  bash scripts/fleet-gym-anything-run.sh
