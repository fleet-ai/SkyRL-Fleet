# Gym-Anything Remote Environment Server
# Runs Docker+sysbox containers for desktop software environments.
# Training/eval VMs connect to this server over HTTP.
#
# Usage:
#   sky launch tasks/gym-anything-server.yaml --env OPENROUTER_API_KEY=$OPENROUTER_API_KEY --cloud gcp -y
#   # Get external IP:
#   ssh <cluster> "curl -s http://metadata.google.internal/computeMetadata/v1/instance/network-interfaces/0/access-configs/0/external-ip -H Metadata-Flavor:Google"
#   # Verify:
#   curl http://<ip>:5000/health
#
# Uses fleet-ai/gym-anything fork (fleet/fixes branch) which includes:
#   1. tigervnc@.service Restart=on-failure (VNC fails on Docker first boot)
#   2. DockerRunner.exec() accepts timeout kwarg (pre_task hooks crash without it)
#   3. Remote worker inlines screenshots in HTTP responses (png_b64)
#   4. _wait_for_desktop() polls screenshot content (>15KB), not just wmctrl
#   5. validate_envs.py — comprehensive env validator (runs in background after startup)

name: gym-anything-server

resources:
  cpus: 128+
  memory: 384+
  disk_size: 500
  ports:
    - 5000
    - 5050
  cloud: gcp

num_nodes: 1

setup: |
  set -euo pipefail

  # ── Docker ──
  if ! command -v docker &>/dev/null; then
    echo "Installing Docker..."
    curl -fsSL https://get.docker.com | sudo sh
    sudo usermod -aG docker $USER
    sudo systemctl enable --now docker
  fi
  sudo chmod 666 /var/run/docker.sock 2>/dev/null || true

  # ── sysbox-runc ──
  if ! command -v sysbox-runc &>/dev/null; then
    echo "Installing sysbox-runc v0.6.7..."
    wget -q "https://github.com/nestybox/sysbox/releases/download/v0.6.7/sysbox-ce_0.6.7.linux_amd64.deb" -O /tmp/sysbox.deb
    sudo dpkg -i /tmp/sysbox.deb || sudo apt-get install -f -y
    rm -f /tmp/sysbox.deb
    sudo systemctl restart docker
    sleep 3
  fi
  docker info 2>&1 | grep -i runtime

  # ── Python + gym-anything (fleet fork with fixes) ──
  sudo apt-get update -qq && sudo apt-get install -y python3-pip python3-venv git
  python3 -m venv ~/ga-venv
  source ~/ga-venv/bin/activate

  if [ ! -d ~/gym-anything ]; then
    git clone -b fleet/fixes https://github.com/fleet-ai/gym-anything.git ~/gym-anything
  else
    cd ~/gym-anything && git fetch origin && git reset --hard origin/fleet/fixes && cd -
  fi
  pip install -e ~/gym-anything
  pip install httpx quart quart-cors hypercorn psutil flask flask-cors openai litellm anthropic Pillow

  # ── Symlink benchmarks into src/ ──
  if [ -d ~/gym-anything/src/benchmarks ] && [ ! -L ~/gym-anything/src/benchmarks ]; then
    sudo rm -rf ~/gym-anything/src/benchmarks
  fi
  ln -sf ~/gym-anything/benchmarks ~/gym-anything/src/benchmarks

  # ── Build base preset image ──
  echo "Building base preset image..."
  docker build -t ga/base:ubuntu_gnome_systemd_highres \
    -f ~/gym-anything/src/gym_anything/presets/ubuntu_gnome_systemd_highres/Dockerfile \
    ~/gym-anything/src/gym_anything/presets/ubuntu_gnome_systemd_highres/

  # ── Pull pre-built env images from GCR ──
  echo "Pulling pre-built env images from GCR..."
  # Auth Docker using VM metadata token (works without interactive login)
  TOKEN=$(curl -sf -H "Metadata-Flavor: Google" http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
  echo "$TOKEN" | docker login -u oauth2accesstoken --password-stdin gcr.io 2>/dev/null || true
  GCR_PREFIX="gcr.io/fleet-compute-489000/gym-anything"
  PULLED=0
  for env_dir in ~/gym-anything/benchmarks/cua_world/environments/*/; do
    env_name=$(basename "$env_dir")
    [ ! -f "$env_dir/env.json" ] && continue
    gcr_tag="${GCR_PREFIX}/${env_name}:0.1"
    tag="ga/${env_name}:0.1"
    # Always pull from GCR — overwrite any base preset tags that may exist
    if docker pull "$gcr_tag" 2>/dev/null; then
      docker tag "$gcr_tag" "$tag"
      PULLED=$((PULLED + 1))
    fi
  done
  echo "Pulled $PULLED pre-built images from GCR"
  echo "Total images: $(docker images | grep '^ga/' | grep -v checkpoint | grep -v base | wc -l)"

  echo "=== Setup Complete ==="

run: |
  source ~/ga-venv/bin/activate

  # VLM checklist verifier config (paper Eq. 2)
  export VLM_BACKEND=openai
  export VLM_MODEL=google/gemini-3-flash-preview
  export OPENAI_API_KEY="${OPENROUTER_API_KEY}"
  export OPENAI_BASE_URL=https://openrouter.ai/api/v1
  export VLM_CHECKLIST_OVERRIDE=1

  # Start 8 workers from src/
  cd ~/gym-anything/src
  for i in $(seq 1 16); do
    nohup python -m gym_anything.remote.worker \
      --master-url http://localhost:5000 \
      --max-envs 20 \
      --host 127.0.0.1 \
      --timeout 300 \
      > ~/worker_${i}.log 2>&1 &
    echo "Worker $i started (PID $!)"
  done

  # Start master server (background for smoke test, then foreground)
  cd ~/gym-anything
  python -m gym_anything.remote.master --host 0.0.0.0 --port 5000 &
  MASTER_PID=$!

  # Wait for master to be healthy
  for i in $(seq 1 30); do
    curl -sf http://localhost:5000/health >/dev/null 2>&1 && break
    sleep 2
  done

  # Smoke test: verify screenshots are non-blank and desktop is responsive
  echo "Running smoke test..."
  pip install requests -q 2>/dev/null
  python3 ~/gym-anything/scripts/smoke_test.py http://localhost:5000 || { echo "SMOKE TEST FAILED"; kill $MASTER_PID; exit 1; }
  echo "Smoke test passed."

  # Run comprehensive env validation in background
  echo "Starting background env validation (results → ~/validated_envs.txt)..."
  nohup python -u ~/gym-anything/scripts/validate_envs.py --env-dir ~/gym-anything/benchmarks/cua_world/environments --output ~/validated_envs.txt --json-output ~/validation_results.json > ~/validate_envs.log 2>&1 &
  echo "Validation PID: $! (monitor with: tail -f ~/validate_envs.log)"

  # Generate eval task list (4 per validated env) — available after validation completes
  nohup bash -c 'while [ ! -f ~/validated_envs.txt ]; do sleep 30; done; cd ~/gym-anything && python scripts/generate_eval_tasks.py --validated-envs ~/validated_envs.txt --env-dir benchmarks/cua_world/environments -o ~/eval_tasks.json && echo "Eval tasks generated: $(wc -l < ~/eval_tasks.json) lines"' > ~/generate_eval_tasks.log 2>&1 &

  # Launch trajectory dashboard on port 5050
  nohup python -m gym_anything.dashboards.trajectory.app --runs-root all_runs --host 0.0.0.0 --port 5050 > ~/dashboard.log 2>&1 &
  echo "Dashboard running on :5050"

  # Keep master in foreground
  cd ~/gym-anything/src
  wait $MASTER_PID
