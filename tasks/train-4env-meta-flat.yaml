# Train 4-env with meta-tools (flat summary, uniform across envs)
# Envs: rops-mail (hero), fira (learning signal), forums-homes, reddit
# Single-node H200:8. epochs=1 doesn't amortize 2-node comm overhead.
# Uses feat/meta-tools-flat on both OpenEnv and SkyRL-Fleet.

name: train-4env-meta-flat

resources:
  disk_size: 500
  memory: 800+
  ports: 6479
  accelerators: H200:8
  cloud: gcp
  use_spot: true
  image_id: projects/deeplearning-platform-release/global/images/common-cu128-ubuntu-2204-nvidia-570-v20260305

num_nodes: 1

workdir:
  url: https://github.com/fleet-ai/SkyRL-Fleet.git
  ref: feat/meta-tools-flat

envs:
  WANDB_API_KEY: ""
  FLEET_API_KEY: ""
  OPENROUTER_API_KEY: ""
  LOGGER: "wandb"
  INFERENCE_BACKEND: "vllm"
  DATA_VERSION: "v6"
  ENV_KEYS: "rops-mail,forums-homes,fira,reddit"
  DIFFICULTY: ""
  MODALITY: "tool_use"
  MAX_TURNS: 50
  MAX_INPUT_LENGTH: 72000
  MAX_GENERATE_LENGTH: 4096
  NUM_EPOCHS: 1
  RUN_ID: "train-4env-meta-flat"
  MAX_TASKS: ""
  RESUME_RUN_NAME: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_REGION: "us-east-1"
  S3_DATASET_BUCKET: "fleet-internal-datasets"
  S3_CHECKPOINT_BUCKET: "skyrl-checkpoints"
  S3_TRAJECTORY_BUCKET: "skyrl-trajectories"
  NUM_INFERENCE_ENGINES: 8

setup: |
  bash scripts/fleet-common-setup.sh \
    --openenv-branch feat/meta-tools-flat \
    --extra-setup scripts/fleet-qwen35-extra-setup.sh

run: |
  bash scripts/fleet-common-run.sh \
    --use-python-direct --cuda-env "$HOME/.cuda_env" \
    --set-ulimit --no-pytorch-alloc-conf \
    --nccl-heartbeat 1800 -- \
    environment.skyrl_gym.fleet_task.ttl_seconds=900 \
    environment.skyrl_gym.fleet_task.partial_reward=true \
    environment.skyrl_gym.fleet_task.enable_hints=false \
    environment.skyrl_gym.fleet_task.enable_meta_tools=true \
    trainer.algorithm.advantage_estimator=grpo \
    trainer.policy.model.path="Qwen/Qwen3.5-9B" \
    trainer.flash_attn=false \
    trainer.loss_chunk_size=4096 \
    trainer.use_sample_packing=false \
    +generator.chat_template_kwargs='{enable_thinking:true}' \
    generator.inference_engine_tensor_parallel_size=1 \
    trainer.epochs=${NUM_EPOCHS} \
    trainer.eval_batch_size=16 \
    trainer.eval_before_train=true \
    trainer.eval_interval=10 \
    trainer.update_epochs_per_batch=1 \
    trainer.train_batch_size=16 \
    trainer.use_hybrid_env_sampling=true \
    trainer.min_samples_per_env=1 \
    trainer.policy_mini_batch_size=16 \
    trainer.micro_forward_batch_size_per_gpu=1 \
    trainer.micro_train_batch_size_per_gpu=1 \
    trainer.ckpt_interval=10 \
    trainer.max_ckpts_to_keep=1 \
    trainer.max_prompt_length=2048 \
    generator.max_input_length=$MAX_INPUT_LENGTH \
    generator.sampling_params.max_generate_length=$MAX_GENERATE_LENGTH \
    generator.sampling_params.temperature=0.9 \
    generator.sampling_params.top_p=0.95 \
    'generator.sampling_params.stop=["</tool_call>"]' \
    'generator.eval_sampling_params.stop=["</tool_call>"]' \
    trainer.policy.optimizer_config.lr=5.0e-7 \
    trainer.algorithm.use_kl_loss=true \
    generator.max_turns=$MAX_TURNS \
    generator.backend=$INFERENCE_BACKEND \
    generator.run_engines_locally=true \
    generator.weight_sync_backend=nccl \
    generator.async_engine=true \
    generator.batched=false \
    generator.use_conversation_multi_turn=true \
    generator.n_samples_per_prompt=8 \
    generator.eval_n_samples_per_prompt=3 \
    generator.enforce_eager=false \
    generator.gpu_memory_utilization=0.65 \
    generator.inject_context_status=true \
    generator.context_warning_threshold=0.90 \
    trainer.logger="$LOGGER" \
    trainer.project_name="fleet-tool-use-grpo" \
    trainer.run_name="fleet_qwen35_9b_tool_use_${RUN_ID}" \
    trainer.resume_mode=latest \
    trainer.ckpt_path="$HOME/ckpts/fleet_qwen35_9b_tool_use" \
    trainer.export_path="$HOME/exports" \
    trainer.dump_data_batch=true \
    trainer.dump_eval_results=true
