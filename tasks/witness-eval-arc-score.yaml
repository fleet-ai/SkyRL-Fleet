# ARC-AGI-3 efficiency-score eval task.
#
# Loads a trained policy ckpt from S3, serves it via standalone vLLM,
# then runs arc-witness-agent's tools/evaluate_arc_score.py to compute
# per-(traj, level) arc_score = min(S_ref/S_agent, 1) * 1[solved] on the
# four held-out games. Uploads the result JSON to S3.
#
# Required env vars (pass via --env):
#   CKPT_LABEL        — descriptive label, e.g. "R4-9B"
#   CKPT_FSDP_S3      — S3 path to FSDP-sharded ckpt dir (containing
#                       model_world_size_*_rank_*.pt shards under policy/)
#                       e.g. s3://.../witness_grpo_v5b7_p2_r5_35b/global_step_51/
#                       The setup section runs merge_fsdp_checkpoint.py to
#                       produce HF format before vLLM startup.
#   ENABLE_SECONDARY_PROVIDER_FALLBACK — "0" for R4-style, "1" for R5
#   POLICY_SIZE_HINT  — "9b" or "35b" (selects base model for tokenizer/config
#                       templating during merge; auto-inferred from path if empty)
#
# Optional:
#   GAMES         — default "tw01 tw09 tw10 tw12"
#   SEEDS         — default "0 1 2"
#   MAX_LEVELS    — default 5
#   SECONDARY_MODEL — default anthropic/claude-sonnet-4.5
#
# Usage (per ckpt; launch 4× for R4-9B / R5-9B / R4-35B / R5-35B):
#   sky launch tasks/witness-eval-arc-score.yaml \
#     -c arc-eval-r5-35b-${USER} \
#     --env CKPT_LABEL=R5-35B \
#     --env CKPT_FSDP_S3=s3://fleet-guanghan/witness_grpo_v5b7_p2_r5_35b/global_step_51/ \
#     --env ENABLE_SECONDARY_PROVIDER_FALLBACK=1 \
#     --env POLICY_SIZE_HINT=35b \
#     --env WANDB_API_KEY=... --env OPENROUTER_API_KEY=... \
#     --env AWS_ACCESS_KEY_ID=... --env AWS_SECRET_ACCESS_KEY=... \
#     -y --detach-run

name: witness-eval-arc-score

resources:
  # 9B eval uses TP=1 (1 GPU); 35B eval uses TP=4 (4 GPUs).  We list 8-GPU
  # nodes for simplicity (only 1 or 4 of 8 get used).  Tried in order:
  # H200 first (best perf), then H100/A100 fallbacks for capacity, all on
  # GCP spot.  Cross-cloud (runpod/nebius/lambda) entries kept for users
  # with those enabled — silently skipped otherwise.
  disk_size: 600
  ports: 8000
  any_of:
    # GCP DL image with CUDA 12.8 + nvidia driver 570 (vLLM latest needs >=12.4).
    # Default GCP A100 images ship with driver 12020 (CUDA 12.2) which fails
    # vLLM init with "NVIDIA driver is too old (found version 12020)".
    # Pin image_id on every GCP entry below to avoid that.
    - accelerators: H200:8
      cloud: gcp
      use_spot: true
      image_id: projects/deeplearning-platform-release/global/images/common-cu128-ubuntu-2204-nvidia-570-v20260305
    - accelerators: H100:8
      cloud: gcp
      use_spot: true
      image_id: projects/deeplearning-platform-release/global/images/common-cu128-ubuntu-2204-nvidia-570-v20260305
    - accelerators: A100-80GB:8
      cloud: gcp
      use_spot: true
      image_id: projects/deeplearning-platform-release/global/images/common-cu128-ubuntu-2204-nvidia-570-v20260305
    - accelerators: A100:8
      cloud: gcp
      use_spot: true
      image_id: projects/deeplearning-platform-release/global/images/common-cu128-ubuntu-2204-nvidia-570-v20260305
    # Cross-cloud fallbacks (user-config-dependent; image not specified)
    - accelerators: H200:8
      cloud: runpod
    - accelerators: H200:8
      cloud: lambda
    - accelerators: H200:8
      cloud: nebius

num_nodes: 1

workdir:
  url: https://github.com/fleet-ai/SkyRL-Fleet.git
  ref: guanghan/b7-phase2-judge-rewards

file_mounts:
  ~/arc-witness-agent: ~/Documents/obsidian/research-directions/repos/arc-witness-agent
  ~/arc-witness-envs: ~/Documents/obsidian/research-directions/repos/arc-witness-envs

envs:
  CKPT_LABEL: ""
  CKPT_FSDP_S3: ""
  ENABLE_SECONDARY_PROVIDER_FALLBACK: "0"
  POLICY_SIZE_HINT: ""          # "9b" or "35b"; auto-detect from path if empty
  GAMES: "tw01 tw09 tw10 tw12"
  SEEDS: "0 1 2"
  MAX_LEVELS: "5"
  SECONDARY_MODEL: "anthropic/claude-sonnet-4.5"

  # Inference settings (overridden by POLICY_SIZE_HINT in run section)
  VLLM_PORT: "8000"
  GPU_MEMORY_UTILIZATION: "0.75"
  MAX_MODEL_LEN: "32768"
  TENSOR_PARALLEL_SIZE: "1"     # overridden for 35B in run section

  # S3 output destination
  OUTPUT_S3_BASE: "s3://fleet-guanghan/arc_score_eval"

  # Credentials
  WANDB_API_KEY: ""
  OPENROUTER_API_KEY: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""

setup: |
  set -euo pipefail

  # Preflight
  if [ -z "${CKPT_LABEL}" ] || [ -z "${CKPT_FSDP_S3}" ]; then
    echo "ERROR: CKPT_LABEL and CKPT_FSDP_S3 must be set." >&2
    exit 1
  fi

  uv venv --python 3.12 --seed
  source .venv/bin/activate
  uv pip install awscli boto3 pyyaml openai huggingface_hub
  # vLLM pinned to 0.18.0 — same version SkyRL trainer uses, known to work
  # with cu128/nvidia-570 image. `vllm>=0.6.0` picked up 0.20+ which built
  # against cu130 wheels (driver 12080 too old for cu130 runtime).
  uv pip install "vllm==0.18.0"
  # vLLM 0.18 pulls transformers 4.57.6, which DOES NOT recognise the
  # `qwen3_5` / `qwen3_5_moe` model types (needed by AutoConfig in
  # merge_fsdp_checkpoint.py). Bump to 5.8.1 which has full Qwen3.5
  # support; vllm 0.18 tolerates this (transformers 5.x adds new model
  # types without breaking the old API surface vllm uses).
  uv pip install --upgrade "transformers==5.8.1"
  uv pip install arc-agi

  export WITNESS_ENVS_DIR=$HOME/arc-witness-envs
  export ARC_WITNESS_AGENT_DIR=$HOME/arc-witness-agent
  export MERGE_SCRIPT="$HOME/sky_workdir/examples/train_integrations/witness/merge_fsdp_checkpoint.py"

  # Sanity-check file_mounts + tooling
  test -f "$ARC_WITNESS_AGENT_DIR/agent/core.py" || { echo "ERROR: arc-witness-agent file_mount missing"; exit 1; }
  test -f "$ARC_WITNESS_AGENT_DIR/tools/evaluate_arc_score.py" || { echo "ERROR: evaluate_arc_score.py missing — make sure local repo is up-to-date"; exit 1; }
  test -d "$WITNESS_ENVS_DIR/environment_files" || { echo "ERROR: environment_files missing"; exit 1; }
  test -f "$MERGE_SCRIPT" || { echo "ERROR: merge_fsdp_checkpoint.py missing at $MERGE_SCRIPT"; exit 1; }
  echo "[ok] file_mounts + merge script present | CKPT_LABEL=$CKPT_LABEL"

  # Decide base model name (used by merge for config templating)
  if [ "${POLICY_SIZE_HINT}" = "35b" ] || echo "$CKPT_FSDP_S3" | grep -qi "35b"; then
    BASE_MODEL="Qwen/Qwen3.5-35B-A3B"
    SIZE_HINT="35b"
  else
    BASE_MODEL="Qwen/Qwen3.5-9B"
    SIZE_HINT="9b"
  fi
  echo "POLICY_SIZE=${SIZE_HINT}" > $HOME/.eval_meta
  echo "BASE_MODEL=${BASE_MODEL}" >> $HOME/.eval_meta

  # === Download FSDP shards from S3 ===
  # The S3 layout (per training yaml's mid-train mirror) is:
  #   ${CKPT_FSDP_S3}/policy/model_world_size_*_rank_*.pt   (~8.7 GB × 8-16 shards)
  #   ${CKPT_FSDP_S3}/policy/optim_world_size_*_rank_*.pt    (NOT needed for inference — skipped)
  #   ${CKPT_FSDP_S3}/policy/extra_state_*.pt                (~14 KB × N)
  # We only fetch the model + extra_state files to save ~140 GB per 35B ckpt.
  FSDP_DIR="$HOME/fsdp_ckpt"
  mkdir -p "$FSDP_DIR"
  echo "[ckpt] downloading FSDP shards from $CKPT_FSDP_S3 (excluding optim)"
  aws s3 sync "$CKPT_FSDP_S3" "$FSDP_DIR/" \
      --exclude "*" \
      --include "policy/model_*" \
      --include "policy/extra_state_*" \
      --include "data.pt" \
      --include "trainer_state.pt" \
      2>&1 | tail -10
  du -sh "$FSDP_DIR/policy" || true
  ls -la "$FSDP_DIR/policy" | head -20

  # === Merge FSDP shards → HF format ===
  MERGED_DIR="$HOME/policy_ckpt"
  mkdir -p "$MERGED_DIR"
  echo "[merge] running merge_fsdp_checkpoint.py (base=$BASE_MODEL)"
  python "$MERGE_SCRIPT" \
      --checkpoint_dir "$FSDP_DIR/policy" \
      --output_dir "$MERGED_DIR" \
      --model_name "$BASE_MODEL" \
      2>&1 | tee "$HOME/merge.log"
  echo "[merge] output dir contents:"
  ls -la "$MERGED_DIR"
  # Sanity: HF format requires config.json + at least one .safetensors / pytorch_model.bin
  if ! ls "$MERGED_DIR"/*.safetensors >/dev/null 2>&1 && ! ls "$MERGED_DIR"/pytorch_model*.bin >/dev/null 2>&1; then
    echo "ERROR: merge did not produce weights file (.safetensors / .bin) in $MERGED_DIR" >&2
    tail -40 "$HOME/merge.log"
    exit 1
  fi
  if [ ! -f "$MERGED_DIR/config.json" ]; then
    echo "ERROR: merge did not produce config.json in $MERGED_DIR" >&2
    exit 1
  fi
  echo "[merge] OK"

  # Patch multimodal config files from base HF (matches trainer-side fix —
  # save_hf_model omits these per memory note feedback_save_hf_model_missing_mm_files)
  echo "[ckpt] patching multimodal config from $BASE_MODEL"
  python -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='$BASE_MODEL', allow_patterns=['preprocessor_config.json','processor_config.json','chat_template.json','chat_template.jinja','video_preprocessor_config.json'], local_dir='$MERGED_DIR', local_dir_use_symlinks=False)" 2>&1 | tail -5

  # Free FSDP-shard disk now that merge is done (saves ~70 GB on 9B, ~140 GB on 35B)
  echo "[cleanup] removing FSDP shards (merge succeeded)"
  rm -rf "$FSDP_DIR"
  df -h | head -5

run: |
  set -euo pipefail
  source .venv/bin/activate
  source $HOME/.eval_meta

  export WITNESS_ENVS_DIR=$HOME/arc-witness-envs
  export ARC_WITNESS_AGENT_DIR=$HOME/arc-witness-agent
  export ENABLE_SECONDARY_PROVIDER_FALLBACK
  export SECONDARY_MODEL
  export OPENROUTER_API_KEY

  # Size-dependent vLLM config
  if [ "$POLICY_SIZE" = "35b" ]; then
    TP_SIZE=8
    MEM_UTIL=0.85
  else
    TP_SIZE=1
    MEM_UTIL=0.75
  fi
  echo "[vllm] POLICY_SIZE=$POLICY_SIZE  TP=$TP_SIZE  MEM=$MEM_UTIL"

  # Start vLLM OpenAI-compatible server in background
  LOG_DIR=$HOME/run_logs
  mkdir -p "$LOG_DIR"
  VLLM_LOG="$LOG_DIR/vllm_server.log"

  echo "[vllm] launching server on port ${VLLM_PORT}"
  export FLASHINFER_DISABLE_VERSION_CHECK=1
  # DEBUG logging + worker stderr capture so Qwen3.5-35B-A3B (MoE+VLM) worker
  # crashes surface to vllm_server.log instead of being swallowed.
  export VLLM_LOGGING_LEVEL=DEBUG
  export VLLM_WORKER_MULTIPROC_METHOD=spawn
  EXTRA_VLLM_FLAGS=""
  if [ "$POLICY_SIZE" = "35b" ]; then
    EXTRA_VLLM_FLAGS='--enforce-eager --limit-mm-per-prompt {"image":0,"video":0}'
  fi
  nohup python -m vllm.entrypoints.openai.api_server \
    --model "$HOME/policy_ckpt" \
    --port "${VLLM_PORT}" \
    --host 0.0.0.0 \
    --tensor-parallel-size "$TP_SIZE" \
    --gpu-memory-utilization "$MEM_UTIL" \
    --max-model-len "${MAX_MODEL_LEN}" \
    --dtype bfloat16 \
    --served-model-name witness-policy \
    --no-enable-log-requests \
    $EXTRA_VLLM_FLAGS \
    > "$VLLM_LOG" 2>&1 &
  VLLM_PID=$!
  echo "[vllm] pid=$VLLM_PID"

  # Wait for /health to become 200 (up to 8 min for 35B load)
  echo "[vllm] waiting for ready..."
  READY=0
  for i in $(seq 1 96); do
    if curl -s -f -o /dev/null "http://localhost:${VLLM_PORT}/health"; then
      READY=1
      break
    fi
    if ! kill -0 $VLLM_PID 2>/dev/null; then
      echo "[vllm] server died during startup; tail of log:"
      tail -50 "$VLLM_LOG"
      exit 1
    fi
    sleep 5
  done
  if [ "$READY" != "1" ]; then
    echo "[vllm] server not ready after 8 min; tail of log:"
    tail -50 "$VLLM_LOG"
    kill $VLLM_PID 2>/dev/null || true
    exit 1
  fi
  echo "[vllm] ready"

  # Run the eval script
  OUTPUT_JSON="$HOME/run_logs/arc_score_${CKPT_LABEL}.json"
  echo "[eval] running tools/evaluate_arc_score.py"
  cd "$ARC_WITNESS_AGENT_DIR"
  python tools/evaluate_arc_score.py \
    --ckpt_label "$CKPT_LABEL" \
    --vllm_base_url "http://localhost:${VLLM_PORT}/v1" \
    --games $GAMES \
    --seeds $SEEDS \
    --max_levels "$MAX_LEVELS" \
    --enable_secondary_fallback "$ENABLE_SECONDARY_PROVIDER_FALLBACK" \
    --secondary_model "$SECONDARY_MODEL" \
    --output_json "$OUTPUT_JSON" \
    2>&1 | tee "$LOG_DIR/eval_${CKPT_LABEL}.log"

  # Upload result to S3
  S3_DEST="${OUTPUT_S3_BASE}/${CKPT_LABEL}.json"
  echo "[s3] uploading result to $S3_DEST"
  aws s3 cp "$OUTPUT_JSON" "$S3_DEST"
  aws s3 cp "$LOG_DIR/eval_${CKPT_LABEL}.log" "${OUTPUT_S3_BASE}/${CKPT_LABEL}_eval.log"
  aws s3 cp "$VLLM_LOG" "${OUTPUT_S3_BASE}/${CKPT_LABEL}_vllm.log"

  # Teardown
  kill $VLLM_PID 2>/dev/null || true
  echo "[done] arc_score eval complete for $CKPT_LABEL — artifacts at ${OUTPUT_S3_BASE}/"
